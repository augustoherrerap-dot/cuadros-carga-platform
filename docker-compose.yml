version: "3.9"

# ── Cuadros de Carga Platform — Docker Compose ────────────────────────────────
# Servicios: aplicación Streamlit + PostgreSQL + MinIO (storage S3-compatible)
#
# Uso rápido:
#   docker compose up -d
#   docker compose logs -f app
#   docker compose down

services:

  # ── Aplicación principal ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuadros_carga_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql+psycopg2://ccuser:ccpass@db:5432/cuadros_carga
      - STORAGE_TYPE=minio
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=cuadros-carga
      - DEBUG=false
    env_file:
      - .env
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cc_network

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cuadros_carga_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccuser
      POSTGRES_PASSWORD: ccpass
      POSTGRES_DB: cuadros_carga
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccuser -d cuadros_carga"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cc_network

  # ── MinIO (storage S3-compatible) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cuadros_carga_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # API S3
      - "9001:9001"    # Consola web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cc_network

  # ── Inicializador de bucket MinIO (se ejecuta una vez y sale) ─────────────
  minio-init:
    image: minio/mc:latest
    container_name: cuadros_carga_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/cuadros-carga;
        mc anonymous set download local/cuadros-carga;
        echo 'Bucket cuadros-carga creado OK';
      "
    networks:
      - cc_network

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  pg_data:
    name: cuadros_carga_pg_data
  minio_data:
    name: cuadros_carga_minio_data
  app_uploads:
    name: cuadros_carga_uploads

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  cc_network:
    name: cuadros_carga_network
    driver: bridge
