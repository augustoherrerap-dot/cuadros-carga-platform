# ── Render.com — Deploy configuration ────────────────────────────────────────
# Documentación: https://render.com/docs/render-yaml-reference
#
# Servicios:
#   - web: aplicación Streamlit (Web Service)
#   - db:  PostgreSQL administrado (Database)
#
# Para desplegar:
#   1. Crear cuenta en render.com
#   2. Conectar repositorio GitHub/GitLab
#   3. "New Blueprint" → seleccionar este render.yaml
#   4. Configurar variables de entorno manualmente (AWS keys, SECRET_KEY)

services:

  # ── Aplicación web Streamlit ───────────────────────────────────────────────
  - type: web
    name: cuadros-carga-platform
    runtime: python
    region: oregon       # oregon | frankfurt | singapore | ohio
    plan: free           # free | starter | standard | pro
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    healthCheckPath: /_stcore/health
    autoDeploy: true

    envVars:
      # Base de datos — se referencia al servicio db creado abajo
      - key: DATABASE_URL
        fromDatabase:
          name: cuadros-carga-db
          property: connectionString

      # Almacenamiento local (gratis, dentro del servidor)
      - key: STORAGE_TYPE
        value: local
      - key: STORAGE_LOCAL_PATH
        value: /tmp/uploads

      - key: SECRET_KEY
        generateValue: true   # Render genera una clave aleatoria segura

  # ── Base de datos PostgreSQL administrada ──────────────────────────────────
databases:
  - name: cuadros-carga-db
    databaseName: cuadros_carga
    user: ccuser
    plan: free           # free: gratis por 90 días, luego $7/mes
    region: oregon
